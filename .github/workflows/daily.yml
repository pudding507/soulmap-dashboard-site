name: SoulMap dashboard daily
on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: fetch
        env:
          METABASE_USER: ${{ secrets.METABASE_USER }}
          METABASE_PASSWORD: ${{ secrets.METABASE_PASSWORD }}
        run: python3 fetch_metabase.py --out raw_metrics.json
      - name: render
        run: python3 render_dashboard.py --raw raw_metrics.json --out site/index.html
      - name: push
        run: |
          git config user.name  "soulmap-bot"
          git config user.email "bot@users.noreply.github.com"
          git add site/index.html
          git commit -m "dashboard $(date -u +%F)" || echo "no change"
          git push
